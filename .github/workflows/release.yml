name: Build and Release

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*.*.*'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.5)'
        required: true
        default: '1.0.5'

jobs:

  # ── Shared Flutter + pub setup (Ubuntu) ───────────────────────────────────
  # build-android runs on ubuntu-latest and uses this cache.
  prepare-ubuntu:
    name: Flutter setup (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Save pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-ubuntu-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-ubuntu-

      - run: flutter pub get

  # ── Shared Flutter + pub setup (macOS) ────────────────────────────────────
  # build-ios runs on macos-latest and uses this cache.
  prepare-macos:
    name: Flutter setup (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Save pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-macos-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-macos-

      - run: flutter pub get

  # ── Android ───────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: prepare-ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.pub-cache
          key: pub-ubuntu-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-ubuntu-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  # ── iOS ───────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: prepare-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.pub-cache
          key: pub-macos-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-macos-

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r musly-ios.ipa Payload
          rm -rf Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: musly-ios.ipa

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🎉 Musly v${{ steps.version.outputs.VERSION }}

            ### 📦 Downloads

            **Android:**
            - ARM64: `app-arm64-v8a-release.apk` (recommended for most devices)
            - ARMv7: `app-armeabi-v7a-release.apk` (for older devices)
            - x86_64: `app-x86_64-release.apk` (for emulators)

            **iOS:**
            - `musly-ios.ipa` (sideload with AltStore, Sideloadly, or similar — not signed)

            ### 📝 Changelog
            See [CHANGELOG.md](https://github.com/dddevid/Musly/blob/master/CHANGELOG.md)

            ### 🌍 Translations
            Contribute translations at [Crowdin](https://crowdin.com/project/musly)
          draft: false
          prerelease: false
          files: |
            artifacts/android-apk/*.apk
            artifacts/ios-build/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
